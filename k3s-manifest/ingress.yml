apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: queryjobs-ingressroute
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    # Auth Service
    - match: Host(`queryjobs.local`) && PathPrefix(`/api/auth`)
      kind: Rule
      services:
        - name: auth-service
          port: 5000
      middlewares:
        - name: strip-auth-prefix

    # Job Service
    - match: Host(`queryjobs.local`) && PathPrefix(`/api/job`)
      kind: Rule
      services:
        - name: job-service
          port: 5001
      middlewares:
        - name: strip-job-prefix

    # User Service
    - match: Host(`queryjobs.local`) && PathPrefix(`/api/user`)
      kind: Rule
      services:
        - name: user-service
          port: 5002
      middlewares:
        - name: strip-user-prefix

    # Utils Service
    - match: Host(`queryjobs.local`) && PathPrefix(`/api/utils`)
      kind: Rule
      services:
        - name: utils-service
          port: 5003
      middlewares:
        - name: strip-utils-prefix

    # Payment Service
    - match: Host(`queryjobs.local`) && PathPrefix(`/api/payments`)
      kind: Rule
      services:
        - name: payment-service
          port: 5004
      middlewares:
        - name: strip-payments-prefix

    # Frontend Route (Next.js Catch-all)
    - match: Host(`queryjobs.local`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: frontend-service
          port: 3000
